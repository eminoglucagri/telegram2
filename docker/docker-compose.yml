version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: telegram_agent
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/telegram_agent
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@db:5432/telegram_agent
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=production
      - DEBUG=false
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../config:/app/config:ro
      - app_data:/app/data
    restart: unless-stopped
    networks:
      - telegram_agent_network

  db:
    image: postgres:15-alpine
    container_name: telegram_agent_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=telegram_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - telegram_agent_network

  redis:
    image: redis:7-alpine
    container_name: telegram_agent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - telegram_agent_network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: telegram_agent_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools
    networks:
      - telegram_agent_network

volumes:
  postgres_data:
  redis_data:
  app_data:

networks:
  telegram_agent_network:
    driver: bridge
