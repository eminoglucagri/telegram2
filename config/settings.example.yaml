# Telegram Stealth Marketing Agent Configuration
# Copy this file to settings.yaml and customize

# Warm-up Configuration
# These settings control how the bot gradually increases activity
# to avoid Telegram's spam detection
warmup:
  stages:
    - stage: 1
      duration_days: 7
      max_messages_per_day: 5
      max_groups: 2
      allowed_actions:
        - read
        - react
      description: "Observation phase - minimal activity"
    
    - stage: 2
      duration_days: 7
      max_messages_per_day: 15
      max_groups: 5
      allowed_actions:
        - read
        - react
        - reply
      description: "Light engagement - replies only"
    
    - stage: 3
      duration_days: 14
      max_messages_per_day: 30
      max_groups: 10
      allowed_actions:
        - read
        - react
        - reply
        - initiate
      description: "Moderate activity - can start conversations"
    
    - stage: 4
      duration_days: 14
      max_messages_per_day: 50
      max_groups: 15
      allowed_actions:
        - read
        - react
        - reply
        - initiate
        - dm_reply
      description: "Active participation - DM replies allowed"
    
    - stage: 5
      duration_days: 0  # Indefinite
      max_messages_per_day: 100
      max_groups: 25
      allowed_actions:
        - read
        - react
        - reply
        - initiate
        - dm_reply
        - dm_initiate
      description: "Full activity - all actions allowed"

# Conversation Settings
conversation:
  # Minimum delay between messages (seconds)
  min_delay: 5
  max_delay: 30
  
  # Typing simulation
  simulate_typing: true
  typing_speed_cpm: 300  # Characters per minute
  
  # Response triggers
  always_respond_to_mentions: true
  respond_to_questions: true
  respond_to_keywords: true

# Marketing Settings
marketing:
  # Lead scoring thresholds
  lead_score_threshold: 0.5
  
  # DM settings
  dm_delay_hours: 2  # Wait before DMing a lead
  max_dm_per_lead: 3
  
  # Follow-up
  follow_up_days: [1, 3, 7]

# Safety Settings
safety:
  # Content moderation
  moderate_content: true
  
  # Blacklisted keywords (never mention)
  blacklisted_keywords:
    - spam
    - scam
    - illegal
  
  # Maximum activity limits (hard caps)
  max_messages_per_hour: 20
  max_groups_per_day: 5
  max_dms_per_day: 20
